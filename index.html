<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Geometry Dash — 20 Levels</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0612;
      --cyan: #00f0ff;
      --magenta: #ff2d95;
      --lime: #b8ff3c;
      --ui: #e8f4ff;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--ui);
      font-family: "Rajdhani", sans-serif;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }

    #wrap {
      position: relative;
      width: 100%;
      height: 100%;
      display: grid;
      place-items: center;
      background:
        radial-gradient(ellipse 80% 50% at 50% 0%, #1a0a3a 0%, transparent 55%),
        radial-gradient(ellipse 60% 40% at 80% 100%, #2a0530 0%, transparent 50%),
        var(--bg);
    }

    canvas {
      display: block;
      width: min(100vw, 1100px);
      height: auto;
      max-height: 100vh;
      image-rendering: pixelated;
      border-radius: 4px;
      box-shadow: 0 0 0 1px rgba(0, 240, 255, 0.15), 0 20px 60px rgba(0, 0, 0, 0.55);
      cursor: pointer;
    }

    #hud {
      position: absolute;
      inset: 0;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding-top: clamp(12px, 3vh, 28px);
      opacity: 0;
      transition: opacity 0.2s;
    }

    #hud.visible { opacity: 1; }

    #title {
      font-family: "Orbitron", sans-serif;
      font-weight: 900;
      font-size: clamp(0.85rem, 2.8vw, 1.35rem);
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--cyan);
      text-shadow: 0 0 18px rgba(0, 240, 255, 0.55);
    }

    #progress-wrap {
      margin-top: 10px;
      width: min(70vw, 420px);
      height: 6px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 999px;
      overflow: hidden;
    }

    #progress {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--cyan), var(--magenta));
      box-shadow: 0 0 12px rgba(0, 240, 255, 0.6);
    }

    #percent {
      margin-top: 6px;
      font-family: "Orbitron", sans-serif;
      font-size: 0.75rem;
      letter-spacing: 0.12em;
      color: rgba(232, 244, 255, 0.65);
    }

    #overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(6, 3, 14, 0.72);
      backdrop-filter: blur(4px);
      transition: opacity 0.25s ease;
      overflow-y: auto;
      padding: 20px;
    }

    #overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    #panel {
      text-align: center;
      padding: 20px;
      max-width: min(920px, 96vw);
      width: 100%;
    }

    #panel h1 {
      font-family: "Orbitron", sans-serif;
      font-weight: 900;
      font-size: clamp(1.4rem, 5vw, 2.4rem);
      letter-spacing: 0.1em;
      line-height: 1.15;
      background: linear-gradient(135deg, var(--cyan), #fff, var(--magenta));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 8px;
    }

    #panel .sub {
      font-size: clamp(0.95rem, 2.5vw, 1.1rem);
      font-weight: 600;
      color: rgba(232, 244, 255, 0.8);
      margin-bottom: 16px;
      letter-spacing: 0.04em;
    }

    #panel .hint {
      font-size: 0.8rem;
      color: rgba(232, 244, 255, 0.4);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-top: 14px;
    }

    #level-grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 10px;
      margin: 18px auto 0;
      max-width: 720px;
    }

    @media (max-width: 600px) {
      #level-grid { grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 8px; }
    }

    .lvl-btn {
      pointer-events: auto;
      appearance: none;
      border: 1px solid rgba(0, 240, 255, 0.25);
      background: rgba(20, 12, 40, 0.85);
      color: var(--ui);
      font-family: "Orbitron", sans-serif;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      padding: 12px 6px 10px;
      border-radius: 6px;
      cursor: pointer;
      transition: transform 0.12s, border-color 0.12s, background 0.12s;
      min-height: 64px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
    }

    .lvl-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      border-color: var(--cyan);
      background: rgba(0, 240, 255, 0.12);
    }

    .lvl-btn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
      border-color: rgba(255, 255, 255, 0.08);
    }

    .lvl-btn.done {
      border-color: rgba(184, 255, 60, 0.45);
      box-shadow: inset 0 0 0 1px rgba(184, 255, 60, 0.15);
    }

    .lvl-btn .num {
      font-size: 1.05rem;
      color: var(--cyan);
    }

    .lvl-btn.done .num { color: var(--lime); }

    .lvl-btn .name {
      font-family: "Rajdhani", sans-serif;
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      color: rgba(232, 244, 255, 0.55);
      line-height: 1.15;
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      padding: 0 2px;
    }

    .lvl-btn .diff {
      font-size: 0.55rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(255, 45, 149, 0.7);
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      margin-top: 16px;
      pointer-events: auto;
    }

    .actions button {
      appearance: none;
      border: 1px solid rgba(0, 240, 255, 0.4);
      background: rgba(0, 240, 255, 0.12);
      color: var(--cyan);
      font-family: "Orbitron", sans-serif;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 12px 22px;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.12s, transform 0.12s;
    }

    .actions button:hover {
      background: rgba(0, 240, 255, 0.22);
      transform: translateY(-1px);
    }

    .actions button.secondary {
      border-color: rgba(255, 255, 255, 0.2);
      background: rgba(255, 255, 255, 0.06);
      color: rgba(232, 244, 255, 0.75);
    }

    #attempts {
      position: absolute;
      bottom: clamp(12px, 3vh, 24px);
      left: 50%;
      transform: translateX(-50%);
      font-family: "Orbitron", sans-serif;
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      color: rgba(232, 244, 255, 0.35);
      pointer-events: none;
    }

    #menu-hint {
      position: absolute;
      bottom: clamp(12px, 3vh, 24px);
      right: clamp(12px, 3vw, 28px);
      font-family: "Orbitron", sans-serif;
      font-size: 0.6rem;
      letter-spacing: 0.12em;
      color: rgba(232, 244, 255, 0.28);
      pointer-events: none;
      opacity: 0;
    }

    #menu-hint.visible { opacity: 1; }
  </style>
</head>
<body>
  <div id="wrap">
    <canvas id="game" width="960" height="540"></canvas>
    <div id="hud">
      <div id="title">STEREO CUBE</div>
      <div id="progress-wrap"><div id="progress"></div></div>
      <div id="percent">0%</div>
    </div>
    <div id="overlay">
      <div id="panel"></div>
    </div>
    <div id="attempts">ATTEMPTS 0</div>
    <div id="menu-hint">ESC — LEVEL SELECT</div>
  </div>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const overlay = document.getElementById("overlay");
    const panel = document.getElementById("panel");
    const progressEl = document.getElementById("progress");
    const percentEl = document.getElementById("percent");
    const attemptsEl = document.getElementById("attempts");
    const titleEl = document.getElementById("title");
    const hud = document.getElementById("hud");
    const menuHint = document.getElementById("menu-hint");

    const W = canvas.width;
    const H = canvas.height;
    const GROUND_Y = H - 90;
    const CUBE = 36;
    const GRAVITY = 0.72;
    const JUMP = -14.2;

    const LEVEL_META = [
      { name: "Stereo Cube", diff: "Easy", scroll: 5.0 },
      { name: "Back On Track", diff: "Easy", scroll: 5.2 },
      { name: "Polargeist", diff: "Easy", scroll: 5.4 },
      { name: "Dry Out", diff: "Normal", scroll: 5.5 },
      { name: "Base After Base", diff: "Normal", scroll: 5.6 },
      { name: "Can't Let Go", diff: "Normal", scroll: 5.5 },
      { name: "Jumper", diff: "Normal", scroll: 5.5 },
      { name: "Time Machine", diff: "Hard", scroll: 6.0 },
      { name: "Cycles", diff: "Hard", scroll: 6.1 },
      { name: "xStep", diff: "Hard", scroll: 6.2 },
      { name: "Clutterfunk", diff: "Hard", scroll: 6.4 },
      { name: "Theory of Everything", diff: "Harder", scroll: 6.5 },
      { name: "Electroman", diff: "Harder", scroll: 6.6 },
      { name: "Clubstep", diff: "Harder", scroll: 6.8 },
      { name: "Electrodynamix", diff: "Harder", scroll: 6.9 },
      { name: "Hexagon Force", diff: "Insane", scroll: 7.0 },
      { name: "Blast Processing", diff: "Insane", scroll: 7.2 },
      { name: "Theory II", diff: "Insane", scroll: 7.3 },
      { name: "Geometrical Dominator", diff: "Insane", scroll: 7.5 },
      { name: "Deadlocked", diff: "Demon", scroll: 7.8 },
    ];

    const SAVE_KEY = "gd_stereo_cube_v1";
    let save = loadSave();
    let levelIndex = 0;
    let levelObjs = [];
    let levelEnd = 1000;
    let scrollSpeed = 5;

    let state = "select"; // select | playing | dead | win
    let attempts = 0;
    let player, particles, camX, bgOffset, shake, deathTimer, beatPulse;
    let jumpQueued = false;
    let audioCtx = null;

    function loadSave() {
      try {
        const raw = localStorage.getItem(SAVE_KEY);
        if (raw) {
          const data = JSON.parse(raw);
          return {
            unlocked: Math.max(1, data.unlocked | 0),
            completed: Array.isArray(data.completed) ? data.completed : [],
          };
        }
      } catch (_) {}
      return { unlocked: 1, completed: [] };
    }

    function persistSave() {
      localStorage.setItem(SAVE_KEY, JSON.stringify(save));
    }

    function makeBuilder() {
      const objs = [];
      let x = 520;
      const spike = (sx, count = 1) => {
        for (let i = 0; i < count; i++) {
          objs.push({ type: "spike", x: sx + i * 36, y: GROUND_Y - 36, w: 36, h: 36 });
        }
      };
      const block = (bx, by = GROUND_Y - 36, bw = 36, bh = 36) => {
        objs.push({ type: "block", x: bx, y: by, w: bw, h: bh });
      };
      const pad = (px) => objs.push({ type: "pad", x: px, y: GROUND_Y - 10, w: 40, h: 10 });
      const gap = (dist) => { x += dist; };
      const finish = () => {
        gap(350);
        objs.push({ type: "finish", x: x, y: GROUND_Y - 120, w: 20, h: 120 });
        return objs.sort((a, b) => a.x - b.x);
      };
      return { objs, get x() { return x; }, set x(v) { x = v; }, spike, block, pad, gap, finish };
    }

    // ——— 20 unique level layouts ———
    const LEVEL_BUILDERS = [
      // 1 Stereo Cube — very easy
      () => {
        const b = makeBuilder();
        b.gap(180);
        for (let i = 0; i < 4; i++) { b.spike(b.x); b.gap(310); }
        b.spike(b.x, 2); b.gap(360);
        b.block(b.x, GROUND_Y - 72, 72, 36); b.gap(280);
        b.spike(b.x); b.gap(300);
        b.pad(b.x); b.gap(55); b.spike(b.x, 2); b.gap(340);
        b.block(b.x); b.gap(40); b.block(b.x, GROUND_Y - 72); b.gap(40); b.block(b.x, GROUND_Y - 108, 72, 36); b.gap(260);
        for (let i = 0; i < 4; i++) { b.spike(b.x); b.gap(290); }
        b.pad(b.x); b.gap(55); b.spike(b.x, 2);
        return b.finish();
      },
      // 2 Back On Track
      () => {
        const b = makeBuilder();
        b.gap(160);
        b.spike(b.x); b.gap(280); b.spike(b.x); b.gap(260);
        b.spike(b.x, 2); b.gap(320);
        for (let i = 0; i < 3; i++) { b.spike(b.x); b.gap(250); }
        b.block(b.x, GROUND_Y - 72, 90, 36); b.gap(220); b.spike(b.x); b.gap(280);
        b.pad(b.x); b.gap(50); b.spike(b.x, 2); b.gap(300);
        b.spike(b.x); b.gap(240); b.spike(b.x, 2); b.gap(300);
        b.block(b.x); b.gap(36); b.block(b.x, GROUND_Y - 72); b.gap(200);
        b.spike(b.x); b.gap(260); b.spike(b.x); b.gap(280);
        return b.finish();
      },
      // 3 Polargeist
      () => {
        const b = makeBuilder();
        b.gap(140);
        for (let i = 0; i < 5; i++) { b.spike(b.x); b.gap(240 - i * 8); }
        b.spike(b.x, 2); b.gap(300);
        b.block(b.x, GROUND_Y - 72, 72, 36); b.gap(180);
        b.block(b.x, GROUND_Y - 108, 72, 36); b.gap(200);
        b.spike(b.x); b.gap(240);
        b.pad(b.x); b.gap(50); b.spike(b.x, 3); b.gap(320);
        for (let i = 0; i < 4; i++) { b.spike(b.x); b.gap(230); }
        b.block(b.x); b.gap(36); b.block(b.x, GROUND_Y - 72); b.gap(36); b.block(b.x, GROUND_Y - 108); b.gap(220);
        b.spike(b.x, 2); b.gap(280);
        return b.finish();
      },
      // 4 Dry Out
      () => {
        const b = makeBuilder();
        b.gap(120);
        b.spike(b.x); b.gap(230); b.spike(b.x, 2); b.gap(280);
        b.spike(b.x); b.gap(210); b.spike(b.x); b.gap(220);
        b.block(b.x, GROUND_Y - 72, 60, 36); b.gap(160); b.spike(b.x); b.gap(240);
        for (let i = 0; i < 3; i++) {
          b.pad(b.x); b.gap(48); b.spike(b.x, 2); b.gap(280);
        }
        b.spike(b.x, 2); b.gap(250); b.spike(b.x); b.gap(220);
        b.block(b.x, GROUND_Y - 72, 80, 36); b.gap(140);
        b.block(b.x, GROUND_Y - 108, 80, 36); b.gap(180);
        b.spike(b.x, 2); b.gap(260);
        return b.finish();
      },
      // 5 Base After Base
      () => {
        const b = makeBuilder();
        b.gap(120);
        for (let i = 0; i < 6; i++) { b.spike(b.x); b.gap(220); }
        b.spike(b.x, 2); b.gap(270);
        b.block(b.x); b.gap(36); b.block(b.x, GROUND_Y - 72); b.gap(36);
        b.block(b.x, GROUND_Y - 108); b.gap(36); b.block(b.x, GROUND_Y - 144, 72, 36); b.gap(200);
        b.spike(b.x); b.gap(210);
        b.pad(b.x); b.gap(45); b.spike(b.x, 3); b.gap(290);
        for (let i = 0; i < 4; i++) { b.spike(b.x); b.gap(200 + (i % 2) * 30); }
        b.spike(b.x, 2); b.gap(250);
        return b.finish();
      },
      // 6 Can't Let Go — fair Normal (no trap platforms in jump arcs)
      () => {
        const b = makeBuilder();
        b.gap(140);
        b.spike(b.x); b.gap(260);
        b.spike(b.x); b.gap(240);
        b.spike(b.x, 2); b.gap(300);
        b.spike(b.x); b.gap(250);
        b.spike(b.x, 2); b.gap(290);
        // Wide platforms you can actually land on, then drop to clear spikes
        b.block(b.x, GROUND_Y - 72, 100, 36); b.gap(280);
        b.spike(b.x); b.gap(260);
        b.block(b.x, GROUND_Y - 72, 100, 36); b.gap(280);
        b.spike(b.x); b.gap(250);
        b.pad(b.x); b.gap(55); b.spike(b.x, 2); b.gap(300);
        b.spike(b.x); b.gap(230);
        b.spike(b.x, 2); b.gap(280);
        b.spike(b.x); b.gap(240);
        b.pad(b.x); b.gap(55); b.spike(b.x, 2); b.gap(300);
        b.spike(b.x); b.gap(250);
        b.spike(b.x, 2); b.gap(280);
        return b.finish();
      },
      // 7 Jumper — pads & easy hops (fair Normal)
      () => {
        const b = makeBuilder();
        b.gap(140);
        // Pad clears — room to land after each
        b.pad(b.x); b.gap(55); b.spike(b.x, 2); b.gap(320);
        b.pad(b.x); b.gap(55); b.spike(b.x, 2); b.gap(300);
        b.spike(b.x); b.gap(250);
        b.pad(b.x); b.gap(55); b.spike(b.x, 2); b.gap(320);
        // Wide low platforms with lots of landing room
        b.block(b.x, GROUND_Y - 72, 120, 36); b.gap(300);
        b.spike(b.x); b.gap(260);
        b.block(b.x, GROUND_Y - 72, 120, 36); b.gap(300);
        b.spike(b.x); b.gap(250);
        b.spike(b.x, 2); b.gap(290);
        b.pad(b.x); b.gap(55); b.spike(b.x, 2); b.gap(320);
        b.spike(b.x); b.gap(240);
        b.spike(b.x); b.gap(260);
        b.pad(b.x); b.gap(55); b.spike(b.x, 2); b.gap(300);
        return b.finish();
      },
      // 8 Time Machine
      () => {
        const b = makeBuilder();
        b.gap(100);
        for (let i = 0; i < 4; i++) {
          b.spike(b.x); b.gap(175);
          b.spike(b.x, 2); b.gap(220);
        }
        b.block(b.x, GROUND_Y - 72); b.gap(120); b.spike(b.x); b.gap(200);
        b.block(b.x, GROUND_Y - 108, 90, 36); b.gap(40); b.spike(b.x); b.gap(220);
        b.pad(b.x); b.gap(42); b.spike(b.x, 3); b.gap(250);
        for (let i = 0; i < 5; i++) { b.spike(b.x); b.gap(185); }
        b.spike(b.x, 2); b.gap(230);
        return b.finish();
      },
      // 9 Cycles — repeating pattern
      () => {
        const b = makeBuilder();
        b.gap(90);
        for (let i = 0; i < 6; i++) {
          b.spike(b.x); b.gap(170);
          b.spike(b.x, 2); b.gap(200);
          b.block(b.x, GROUND_Y - 72, 54, 36); b.gap(170);
        }
        b.pad(b.x); b.gap(42); b.spike(b.x, 3); b.gap(240);
        b.spike(b.x, 2); b.gap(220);
        return b.finish();
      },
      // 10 xStep
      () => {
        const b = makeBuilder();
        b.gap(90);
        for (let i = 0; i < 8; i++) {
          b.spike(b.x, 1 + (i % 2)); b.gap(175 - (i % 3) * 8);
        }
        b.block(b.x); b.gap(36); b.block(b.x, GROUND_Y - 72); b.gap(36);
        b.block(b.x, GROUND_Y - 108); b.gap(36); b.block(b.x, GROUND_Y - 144); b.gap(180);
        b.spike(b.x, 2); b.gap(210);
        b.pad(b.x); b.gap(40); b.spike(b.x, 4); b.gap(260);
        for (let i = 0; i < 4; i++) { b.spike(b.x); b.gap(165); }
        return b.finish();
      },
      // 11 Clutterfunk — denser mix
      () => {
        const b = makeBuilder();
        b.gap(80);
        for (let i = 0; i < 5; i++) {
          b.spike(b.x, 2); b.gap(190);
          b.block(b.x, GROUND_Y - 72, 48, 36); b.gap(130);
          b.spike(b.x); b.gap(170);
        }
        b.pad(b.x); b.gap(40); b.spike(b.x, 3); b.gap(220);
        b.block(b.x, GROUND_Y - 108, 72, 36); b.gap(30); b.spike(b.x, 2); b.gap(230);
        for (let i = 0; i < 5; i++) { b.spike(b.x); b.gap(160); }
        b.spike(b.x, 2); b.gap(210);
        return b.finish();
      },
      // 12 Theory of Everything
      () => {
        const b = makeBuilder();
        b.gap(80);
        for (let i = 0; i < 4; i++) {
          b.spike(b.x); b.gap(155);
          b.spike(b.x, 2); b.gap(185);
          b.pad(b.x); b.gap(40); b.spike(b.x, 2); b.gap(220);
        }
        b.block(b.x, GROUND_Y - 72, 60, 36); b.gap(140);
        b.block(b.x, GROUND_Y - 108, 60, 36); b.gap(140);
        b.block(b.x, GROUND_Y - 144, 80, 36); b.gap(180);
        b.spike(b.x, 2); b.gap(200);
        for (let i = 0; i < 6; i++) { b.spike(b.x); b.gap(155); }
        return b.finish();
      },
      // 13 Electroman
      () => {
        const b = makeBuilder();
        b.gap(70);
        for (let i = 0; i < 10; i++) {
          b.spike(b.x, i % 3 === 2 ? 2 : 1); b.gap(155 - (i % 4) * 5);
        }
        b.block(b.x); b.gap(36); b.block(b.x, GROUND_Y - 72); b.gap(36);
        b.block(b.x, GROUND_Y - 108); b.gap(150);
        b.spike(b.x, 2); b.gap(190);
        for (let i = 0; i < 3; i++) {
          b.pad(b.x); b.gap(38); b.spike(b.x, 3); b.gap(230);
        }
        b.spike(b.x, 2); b.gap(200);
        return b.finish();
      },
      // 14 Clubstep
      () => {
        const b = makeBuilder();
        b.gap(70);
        for (let i = 0; i < 6; i++) {
          b.spike(b.x, 2); b.gap(175);
          b.spike(b.x); b.gap(150);
          b.block(b.x, GROUND_Y - 72, 48, 36); b.gap(120);
        }
        b.pad(b.x); b.gap(38); b.spike(b.x, 4); b.gap(240);
        b.block(b.x, GROUND_Y - 108, 60, 36); b.gap(25); b.spike(b.x, 2); b.gap(210);
        for (let i = 0; i < 5; i++) { b.spike(b.x, 1 + (i % 2)); b.gap(155); }
        return b.finish();
      },
      // 15 Electrodynamix
      () => {
        const b = makeBuilder();
        b.gap(60);
        for (let i = 0; i < 8; i++) {
          b.spike(b.x); b.gap(145);
          if (i % 2 === 0) { b.spike(b.x, 2); b.gap(170); }
          else { b.block(b.x, GROUND_Y - 72, 48, 36); b.gap(130); }
        }
        for (let i = 0; i < 3; i++) {
          b.pad(b.x); b.gap(36); b.spike(b.x, 3); b.gap(210);
        }
        for (let i = 0; i < 4; i++) { b.spike(b.x, 2); b.gap(165); }
        return b.finish();
      },
      // 16 Hexagon Force
      () => {
        const b = makeBuilder();
        b.gap(60);
        for (let i = 0; i < 7; i++) {
          b.spike(b.x, 2); b.gap(155);
          b.block(b.x, GROUND_Y - (72 + (i % 3) * 36), 48, 36); b.gap(125);
          b.spike(b.x); b.gap(145);
        }
        b.pad(b.x); b.gap(35); b.spike(b.x, 4); b.gap(220);
        for (let i = 0; i < 6; i++) { b.spike(b.x); b.gap(140); }
        b.spike(b.x, 2); b.gap(190);
        return b.finish();
      },
      // 17 Blast Processing
      () => {
        const b = makeBuilder();
        b.gap(50);
        for (let i = 0; i < 12; i++) {
          b.spike(b.x, 1 + (i % 3 === 0 ? 1 : 0)); b.gap(140 - (i % 5));
        }
        b.block(b.x, GROUND_Y - 72, 54, 36); b.gap(110);
        b.block(b.x, GROUND_Y - 108, 54, 36); b.gap(110);
        b.block(b.x, GROUND_Y - 144, 72, 36); b.gap(150);
        for (let i = 0; i < 4; i++) {
          b.pad(b.x); b.gap(34); b.spike(b.x, 3); b.gap(200);
        }
        for (let i = 0; i < 5; i++) { b.spike(b.x, 2); b.gap(150); }
        return b.finish();
      },
      // 18 Theory II
      () => {
        const b = makeBuilder();
        b.gap(50);
        for (let i = 0; i < 5; i++) {
          b.spike(b.x, 2); b.gap(145);
          b.spike(b.x); b.gap(135);
          b.pad(b.x); b.gap(34); b.spike(b.x, 2); b.gap(190);
          b.block(b.x, GROUND_Y - 72, 48, 36); b.gap(115);
        }
        b.block(b.x); b.gap(36); b.block(b.x, GROUND_Y - 72); b.gap(36);
        b.block(b.x, GROUND_Y - 108); b.gap(36); b.block(b.x, GROUND_Y - 144); b.gap(160);
        for (let i = 0; i < 6; i++) { b.spike(b.x, 1 + (i % 2)); b.gap(140); }
        return b.finish();
      },
      // 19 Geometrical Dominator
      () => {
        const b = makeBuilder();
        b.gap(45);
        for (let i = 0; i < 8; i++) {
          b.spike(b.x, 2); b.gap(140);
          b.block(b.x, GROUND_Y - 72 - (i % 2) * 36, 42, 36); b.gap(110);
          b.spike(b.x); b.gap(135);
        }
        for (let i = 0; i < 4; i++) {
          b.pad(b.x); b.gap(32); b.spike(b.x, 4); b.gap(200);
        }
        for (let i = 0; i < 7; i++) { b.spike(b.x, 2); b.gap(145); }
        return b.finish();
      },
      // 20 Deadlocked — demon
      () => {
        const b = makeBuilder();
        b.gap(40);
        for (let i = 0; i < 10; i++) {
          b.spike(b.x, 2); b.gap(130);
          b.spike(b.x); b.gap(120);
          if (i % 2 === 0) {
            b.block(b.x, GROUND_Y - 72, 42, 36); b.gap(100);
            b.spike(b.x); b.gap(130);
          } else {
            b.pad(b.x); b.gap(30); b.spike(b.x, 3); b.gap(180);
          }
        }
        b.block(b.x); b.gap(36); b.block(b.x, GROUND_Y - 72); b.gap(36);
        b.block(b.x, GROUND_Y - 108); b.gap(36); b.block(b.x, GROUND_Y - 144); b.gap(130);
        for (let i = 0; i < 8; i++) { b.spike(b.x, 1 + (i % 2)); b.gap(125); }
        b.pad(b.x); b.gap(28); b.spike(b.x, 5); b.gap(200);
        for (let i = 0; i < 5; i++) { b.spike(b.x, 2); b.gap(135); }
        return b.finish();
      },
    ];

    function loadLevel(index) {
      levelIndex = index;
      const meta = LEVEL_META[index];
      scrollSpeed = meta.scroll;
      levelObjs = LEVEL_BUILDERS[index]();
      levelEnd = levelObjs[levelObjs.length - 1].x + 400;
      titleEl.textContent = `${index + 1}. ${meta.name.toUpperCase()}`;
      attempts = 0;
      attemptsEl.textContent = `ATTEMPTS 0`;
    }

    function resetPlayer() {
      player = {
        x: 140,
        y: GROUND_Y - CUBE,
        vx: 0,
        vy: 0,
        onGround: true,
        rotating: 0,
        angle: 0,
        alive: true,
        trail: [],
      };
      camX = 0;
      bgOffset = 0;
      particles = [];
      shake = 0;
      deathTimer = 0;
      beatPulse = 0;
      jumpQueued = false;
      progressEl.style.width = "0%";
      percentEl.textContent = "0%";
    }

    function startGame(index) {
      if (index != null) loadLevel(index);
      attempts++;
      attemptsEl.textContent = `ATTEMPTS ${attempts}`;
      resetPlayer();
      state = "playing";
      overlay.classList.add("hidden");
      hud.classList.add("visible");
      menuHint.classList.add("visible");
      ensureAudio();
      playTone(440, 0.06, "square", 0.08);
    }

    function showSelect() {
      state = "select";
      hud.classList.remove("visible");
      menuHint.classList.remove("visible");
      overlay.classList.remove("hidden");
      const done = new Set(save.completed);
      let grid = "";
      for (let i = 0; i < 20; i++) {
        const meta = LEVEL_META[i];
        const unlocked = i < save.unlocked;
        const cleared = done.has(i);
        grid += `<button class="lvl-btn${cleared ? " done" : ""}" data-level="${i}" ${unlocked ? "" : "disabled"}>
          <span class="num">${i + 1}</span>
          <span class="name">${meta.name}</span>
          <span class="diff">${unlocked ? meta.diff : "LOCKED"}</span>
        </button>`;
      }
      panel.innerHTML = `
        <h1>GEOMETRY DASH</h1>
        <p class="sub">20 levels — clear one to unlock the next</p>
        <div id="level-grid">${grid}</div>
        <p class="hint">Click a level to play · Esc returns here</p>
      `;
      panel.querySelectorAll(".lvl-btn").forEach((btn) => {
        btn.addEventListener("click", (e) => {
          e.stopPropagation();
          startGame(+btn.dataset.level);
        });
      });
    }

    function showDead() {
      overlay.classList.remove("hidden");
      panel.innerHTML = `
        <h1>CRASHED!</h1>
        <p class="sub">${LEVEL_META[levelIndex].name} — Attempt ${attempts}</p>
        <div class="actions">
          <button id="btn-retry">Retry</button>
          <button class="secondary" id="btn-menu">Levels</button>
        </div>
      `;
      document.getElementById("btn-retry").onclick = (e) => { e.stopPropagation(); startGame(); };
      document.getElementById("btn-menu").onclick = (e) => { e.stopPropagation(); showSelect(); };
    }

    function showWin() {
      const isLast = levelIndex >= 19;
      const next = levelIndex + 1;
      if (!save.completed.includes(levelIndex)) {
        save.completed.push(levelIndex);
      }
      if (next + 1 > save.unlocked) {
        save.unlocked = Math.min(20, next + 1);
      }
      persistSave();

      overlay.classList.remove("hidden");
      panel.innerHTML = `
        <h1>${isLast ? "ALL CLEAR!" : "LEVEL COMPLETE!"}</h1>
        <p class="sub">${LEVEL_META[levelIndex].name} — 100%</p>
        <div class="actions">
          ${isLast ? "" : `<button id="btn-next">Next Level</button>`}
          <button id="btn-retry">Replay</button>
          <button class="secondary" id="btn-menu">Levels</button>
        </div>
      `;
      const nextBtn = document.getElementById("btn-next");
      if (nextBtn) nextBtn.onclick = (e) => { e.stopPropagation(); startGame(next); };
      document.getElementById("btn-retry").onclick = (e) => { e.stopPropagation(); startGame(); };
      document.getElementById("btn-menu").onclick = (e) => { e.stopPropagation(); showSelect(); };
      progressEl.style.width = "100%";
      percentEl.textContent = "100%";
    }

    function ensureAudio() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === "suspended") audioCtx.resume();
    }

    function playTone(freq, dur, type = "square", vol = 0.1) {
      if (!audioCtx) return;
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.type = type;
      o.frequency.value = freq;
      g.gain.value = vol;
      g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
      o.connect(g);
      g.connect(audioCtx.destination);
      o.start();
      o.stop(audioCtx.currentTime + dur);
    }

    function jump() {
      if (state === "select") return;
      if (state === "dead") {
        if (deathTimer < 20) return;
        startGame();
        return;
      }
      if (state === "win") {
        if (levelIndex < 19) startGame(levelIndex + 1);
        else startGame();
        return;
      }
      if (!player.alive) return;
      if (player.onGround) {
        player.vy = JUMP;
        player.onGround = false;
        player.rotating = 1;
        playTone(520, 0.07, "square", 0.09);
      } else {
        jumpQueued = true;
      }
    }

    function die() {
      if (!player.alive) return;
      player.alive = false;
      state = "dead";
      shake = 12;
      playTone(120, 0.25, "sawtooth", 0.15);
      playTone(80, 0.35, "square", 0.1);
      for (let i = 0; i < 28; i++) {
        const a = Math.random() * Math.PI * 2;
        const sp = 2 + Math.random() * 7;
        particles.push({
          x: camX + player.x + CUBE / 2,
          y: player.y + CUBE / 2,
          vx: Math.cos(a) * sp,
          vy: Math.sin(a) * sp - 2,
          life: 40 + Math.random() * 20,
          color: Math.random() > 0.5 ? "#00f0ff" : "#ff2d95",
          size: 3 + Math.random() * 5,
        });
      }
      deathTimer = 0;
      setTimeout(() => { if (state === "dead") showDead(); }, 400);
    }

    function win() {
      if (state !== "playing") return;
      state = "win";
      playTone(523, 0.12, "square", 0.1);
      setTimeout(() => playTone(659, 0.12, "square", 0.1), 100);
      setTimeout(() => playTone(784, 0.25, "square", 0.12), 200);
      showWin();
    }

    function rectsOverlap(a, b) {
      return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
    }

    function spikeHit(px, py, pw, ph, s) {
      const cx = s.x + s.w / 2;
      const tipY = s.y;
      const hit = { x: s.x + 12, y: s.y + 14, w: s.w - 24, h: s.h - 14 };
      if (!rectsOverlap({ x: px, y: py, w: pw, h: ph }, hit)) return false;
      const playerBottom = py + ph;
      const playerCenterX = px + pw / 2;
      const t = Math.abs(playerCenterX - cx) / (s.w / 2);
      const spikeTopAtX = tipY + t * s.h;
      return playerBottom > spikeTopAtX + 10;
    }

    function update() {
      if (state !== "playing" || !player.alive) {
        if (state === "dead") {
          deathTimer++;
          updateParticles();
          if (shake > 0) shake *= 0.88;
        }
        return;
      }

      beatPulse = (beatPulse + 0.08) % (Math.PI * 2);
      camX += scrollSpeed;
      bgOffset += scrollSpeed * 0.35;
      player.vy += GRAVITY;
      player.y += player.vy;

      if (player.y >= GROUND_Y - CUBE) {
        player.y = GROUND_Y - CUBE;
        player.vy = 0;
        if (!player.onGround) {
          player.onGround = true;
          player.angle = Math.round(player.angle / (Math.PI / 2)) * (Math.PI / 2);
          player.rotating = 0;
          if (jumpQueued) { jumpQueued = false; jump(); }
        } else {
          player.onGround = true;
        }
      }

      const worldX = camX + player.x;
      const pBox = { x: worldX + 8, y: player.y + 8, w: CUBE - 16, h: CUBE - 16 };

      for (const o of levelObjs) {
        if (o.x + o.w < worldX - 50 || o.x > worldX + W) continue;

        if (o.type === "block") {
          const prevBottom = player.y - player.vy + CUBE - 4;
          if (
            pBox.x < o.x + o.w && pBox.x + pBox.w > o.x &&
            prevBottom <= o.y + 2 && player.y + CUBE - 4 >= o.y && player.vy >= 0
          ) {
            player.y = o.y - CUBE;
            player.vy = 0;
            if (!player.onGround) {
              player.onGround = true;
              player.angle = Math.round(player.angle / (Math.PI / 2)) * (Math.PI / 2);
              player.rotating = 0;
              if (jumpQueued) { jumpQueued = false; jump(); }
            }
          } else if (rectsOverlap(pBox, o)) {
            if (player.y + CUBE - 8 > o.y + 8) die();
          }
        }

        if (o.type === "spike" && spikeHit(pBox.x, pBox.y, pBox.w, pBox.h, o)) die();

        if (o.type === "pad" && rectsOverlap(pBox, o) && player.vy >= 0) {
          player.vy = JUMP * 1.35;
          player.onGround = false;
          player.rotating = 1;
          playTone(700, 0.08, "square", 0.1);
        }

        if (o.type === "finish" && worldX + CUBE > o.x) win();
      }

      if (player.rotating || !player.onGround) player.angle += 0.18;

      player.trail.push({ x: worldX, y: player.y, a: 1 });
      if (player.trail.length > 10) player.trail.shift();
      for (const t of player.trail) t.a *= 0.88;

      updateParticles();

      const pct = Math.min(100, Math.floor((camX / (levelEnd - W)) * 100));
      progressEl.style.width = pct + "%";
      percentEl.textContent = pct + "%";
      if (shake > 0) shake *= 0.88;
    }

    function updateParticles() {
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.25;
        p.life--;
        if (p.life <= 0) particles.splice(i, 1);
      }
    }

    function drawBackground() {
      const g = ctx.createLinearGradient(0, 0, 0, H);
      const hueShift = levelIndex / 20;
      g.addColorStop(0, `hsl(${270 + hueShift * 40}, 55%, 12%)`);
      g.addColorStop(0.55, `hsl(${280 + hueShift * 30}, 50%, 14%)`);
      g.addColorStop(1, "#0d0618");
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, W, H);

      const pulse = 0.5 + 0.5 * Math.sin(beatPulse);
      ctx.strokeStyle = `rgba(0, 240, 255, ${0.06 + pulse * 0.04})`;
      ctx.lineWidth = 1;
      const gridSize = 48;
      const ox = -(bgOffset % gridSize);
      for (let x = ox; x < W; x += gridSize) {
        ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, GROUND_Y); ctx.stroke();
      }
      for (let y = 0; y < GROUND_Y; y += gridSize) {
        ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
      }

      drawHills(bgOffset * 0.2, 0.6, "#ff2d9522");
      drawHills(bgOffset * 0.45, 0.85, "#00f0ff18");
    }

    function drawHills(offset, scale, color) {
      ctx.beginPath();
      ctx.moveTo(0, GROUND_Y);
      for (let i = 0; i <= W; i += 40) {
        const wx = i + offset;
        const h = Math.sin(wx * 0.008) * 40 * scale + Math.sin(wx * 0.02) * 18 * scale;
        ctx.lineTo(i, GROUND_Y - 60 * scale - h);
      }
      ctx.lineTo(W, GROUND_Y);
      ctx.closePath();
      ctx.fillStyle = color;
      ctx.fill();
    }

    function drawGround() {
      ctx.fillStyle = "#140c28";
      ctx.fillRect(0, GROUND_Y, W, H - GROUND_Y);
      ctx.strokeStyle = "#00f0ff";
      ctx.lineWidth = 3;
      ctx.shadowColor = "#00f0ff";
      ctx.shadowBlur = 12;
      ctx.beginPath();
      ctx.moveTo(0, GROUND_Y);
      ctx.lineTo(W, GROUND_Y);
      ctx.stroke();
      ctx.shadowBlur = 0;
      const tile = 40;
      const start = -(camX % tile);
      ctx.fillStyle = "rgba(0, 240, 255, 0.06)";
      for (let x = start; x < W; x += tile) ctx.fillRect(x, GROUND_Y + 8, 2, H - GROUND_Y);
      ctx.fillStyle = "#ff2d95";
      ctx.globalAlpha = 0.35;
      ctx.fillRect(0, GROUND_Y + 4, W, 3);
      ctx.globalAlpha = 1;
    }

    function drawSpike(o, sx) {
      ctx.beginPath();
      ctx.moveTo(sx + o.w / 2, o.y);
      ctx.lineTo(sx + o.w, o.y + o.h);
      ctx.lineTo(sx, o.y + o.h);
      ctx.closePath();
      const grad = ctx.createLinearGradient(sx, o.y, sx, o.y + o.h);
      grad.addColorStop(0, "#ff4db8");
      grad.addColorStop(1, "#c01060");
      ctx.fillStyle = grad;
      ctx.fill();
      ctx.strokeStyle = "#ff9ad5";
      ctx.lineWidth = 1.5;
      ctx.stroke();
    }

    function drawBlock(o, sx) {
      const grad = ctx.createLinearGradient(sx, o.y, sx, o.y + o.h);
      grad.addColorStop(0, "#3d2a7a");
      grad.addColorStop(1, "#1e1445");
      ctx.fillStyle = grad;
      ctx.fillRect(sx, o.y, o.w, o.h);
      ctx.strokeStyle = "#00f0ff";
      ctx.lineWidth = 2;
      ctx.strokeRect(sx + 1, o.y + 1, o.w - 2, o.h - 2);
      ctx.strokeStyle = "rgba(184, 255, 60, 0.35)";
      ctx.strokeRect(sx + 8, o.y + 8, o.w - 16, o.h - 16);
    }

    function drawPad(o, sx) {
      ctx.fillStyle = "#b8ff3c";
      ctx.shadowColor = "#b8ff3c";
      ctx.shadowBlur = 10;
      ctx.fillRect(sx, o.y, o.w, o.h);
      ctx.shadowBlur = 0;
      ctx.fillStyle = "#f0ffb0";
      ctx.fillRect(sx + 4, o.y + 2, o.w - 8, 3);
    }

    function drawFinish(o, sx) {
      ctx.fillStyle = "#e8f4ff";
      ctx.fillRect(sx, o.y, 6, o.h);
      const cell = 12;
      for (let row = 0; row < 6; row++) {
        for (let col = 0; col < 4; col++) {
          ctx.fillStyle = (row + col) % 2 === 0 ? "#fff" : "#111";
          ctx.fillRect(sx + 6 + col * cell, o.y + row * cell, cell, cell);
        }
      }
    }

    function drawPlayer() {
      if (!player || !player.alive) return;
      for (const t of player.trail) {
        ctx.globalAlpha = t.a * 0.35;
        ctx.fillStyle = "#00f0ff";
        ctx.fillRect(t.x - camX + 6, t.y + 6, CUBE - 12, CUBE - 12);
      }
      ctx.globalAlpha = 1;
      ctx.save();
      ctx.translate(player.x + CUBE / 2, player.y + CUBE / 2);
      ctx.rotate(player.angle);
      ctx.shadowColor = "#00f0ff";
      ctx.shadowBlur = 16;
      const grad = ctx.createLinearGradient(-CUBE / 2, -CUBE / 2, CUBE / 2, CUBE / 2);
      grad.addColorStop(0, "#5ef0ff");
      grad.addColorStop(1, "#1a8cff");
      ctx.fillStyle = grad;
      ctx.fillRect(-CUBE / 2, -CUBE / 2, CUBE, CUBE);
      ctx.shadowBlur = 0;
      ctx.strokeStyle = "#fff";
      ctx.lineWidth = 2;
      ctx.strokeRect(-CUBE / 2 + 1, -CUBE / 2 + 1, CUBE - 2, CUBE - 2);
      ctx.fillStyle = "rgba(10, 6, 18, 0.55)";
      ctx.fillRect(-10, -10, 20, 20);
      ctx.fillStyle = "#b8ff3c";
      ctx.fillRect(-6, -6, 5, 5);
      ctx.fillRect(2, -6, 5, 5);
      ctx.fillRect(-4, 3, 8, 3);
      ctx.restore();
    }

    function drawParticles() {
      for (const p of particles) {
        ctx.globalAlpha = Math.max(0, p.life / 50);
        ctx.fillStyle = p.color;
        ctx.fillRect(p.x - camX, p.y, p.size, p.size);
      }
      ctx.globalAlpha = 1;
    }

    function draw() {
      ctx.save();
      if (shake > 0.5) {
        ctx.translate((Math.random() - 0.5) * shake, (Math.random() - 0.5) * shake);
      }
      drawBackground();
      drawGround();
      if (state !== "select") {
        for (const o of levelObjs) {
          const sx = o.x - camX;
          if (sx + o.w < -40 || sx > W + 40) continue;
          if (o.type === "spike") drawSpike(o, sx);
          else if (o.type === "block") drawBlock(o, sx);
          else if (o.type === "pad") drawPad(o, sx);
          else if (o.type === "finish") drawFinish(o, sx);
        }
        drawPlayer();
        drawParticles();
      }
      const vg = ctx.createRadialGradient(W / 2, H / 2, H * 0.3, W / 2, H / 2, H * 0.85);
      vg.addColorStop(0, "rgba(0,0,0,0)");
      vg.addColorStop(1, "rgba(0,0,0,0.45)");
      ctx.fillStyle = vg;
      ctx.fillRect(0, 0, W, H);
      ctx.restore();
    }

    function loop() {
      update();
      draw();
      requestAnimationFrame(loop);
    }

    function onPress(e) {
      if (e.type === "keydown" && e.code === "Escape") {
        e.preventDefault();
        if (state !== "select") showSelect();
        return;
      }
      if (state === "select") return;
      // Let overlay buttons handle their own clicks (avoid double-start)
      if (e.type !== "keydown" && !overlay.classList.contains("hidden")) return;
      if (e.type === "keydown" && e.repeat) return;
      if (e.type === "keydown" && e.code !== "Space" && e.code !== "ArrowUp" && e.code !== "KeyW") return;
      e.preventDefault();
      jump();
    }

    window.addEventListener("keydown", onPress);
    window.addEventListener("mousedown", onPress);
    window.addEventListener("touchstart", onPress, { passive: false });

    resetPlayer();
    showSelect();
    loop();
  </script>
</body>
</html>
